set -s set-clipboard off
set -s copy-command 'xclip -selection clipboard'

# kill all windows current
bind-key W run-shell "tmux display-message -p -F '#{window_index}' | xargs -r tmux kill-window -a -t"

# kill the current window
bind-key w run-shell "                                                \
index=\$(tmux display-message -p -F '#{window_index}');               \
if [ \$(tmux display-message -p -F '#{window_end_flag}') == 1 ]; then \
  tmux killw -t \$index;                                              \
  tmux select-window -t \$((index-1));                                \
else                                                                  \
  tmux killw -t \$index;                                              \
  tmux select-window -t \$index;                                      \
fi"

bind-key k clear-history

# enable mouse
set -g mouse on

# split window in the currect directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# window/pane starts with 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1

# auto renumber when any window is closed
set-option -g renumber-windows on

set-option -sa terminal-overrides ",xterm*:Tc"

# emacs, I'm doing this for you
unbind C-b
set -g prefix `
bind ` send-prefix

# copy mode (vi) quick maneuvering
bind -T copy-mode-vi c-k 'send -N 4 k'
bind -T copy-mode-vi c-j 'send -N 4 j'
bind -T copy-mode-vi c-h 'send -N 4 h'
bind -T copy-mode-vi c-l 'send -N 4 l'
bind -T copy-mode-vi S 'send \^'
bind -T copy-mode-vi D 'send \$'

# status bar formats
set-option -g status-left "#{session_name}: "
set -g status-justify left
set-option -g status-right ""
set-option -g window-status-current-format "#[bg=color240]#I#W#[bg=default]"
set-option -g window-status-last-style "none"
set-option -g window-status-format "#I#W"
set-option -g status-style fg=color255,bg=color243

# window scrolling in vi mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
# copy-command is used when copy-pipe is called with no arguments
bind-key -T copy-mode-vi 'y' send -X copy-pipe

# move status bar to top
set-option -g status-position top

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# plugins that save sessions
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# auto restore
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# keep this line at the bottom
run '~/.tmux/plugins/tpm/tpm'
